project:
  type: book
  output-dir: docs

book:
  title: "OPALX Physics Manual"
  subtitle: "Theory, numerical models, and benchmark problems"
  chapters:
    - index.qmd
    - sections/overview/index.qmd
    - sections/coordinate-systems/index.qmd
    - sections/elements/index.qmd
    - sections/field-solvers/index.qmd
    - sections/beam-beam/index.qmd
    - sections/decay-processes/index.qmd
    - sections/beam-matter-interactions/index.qmd
    - sections/gamma-gamma/index.qmd
    - sections/literature/index.qmd

number-sections: true
number-depth: 3

format:
  html:
    toc: true
    number-sections: true
    html-math-method: mathjax
    code-fold: false
    theme: cosmo
  pdf:
    include-in-header:
      - includes/tikz-preamble.tex

bibliography: references.bib
